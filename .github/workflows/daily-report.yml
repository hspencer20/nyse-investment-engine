name: Daily Investment Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: Report type
        required: true
        default: PRE_MARKET
        type: choice
        options:
          - PRE_MARKET
          - POST_MARKET

  schedule:
    # 1 hora 45 minutos antes de la apertura de las 9:30 a. m. de Nueva York
    - cron: "45 7 * * 1-5"
      timezone: "America/New_York"

    # 45 minutos después del cierre de las 4:00 p. m. de Nueva York
    - cron: "45 16 * * 1-5"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: daily-investment-report
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Determine report type
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REPORT_TYPE="${{ inputs.report_type }}"
          elif [[ "${{ github.event.schedule }}" == "45 7 * * 1-5" ]]; then
            REPORT_TYPE="PRE_MARKET"
          elif [[ "${{ github.event.schedule }}" == "45 16 * * 1-5" ]]; then
            REPORT_TYPE="POST_MARKET"
          else
            echo "Unable to determine report type."
            exit 1
          fi

          echo "REPORT_TYPE=$REPORT_TYPE" >> "$GITHUB_ENV"
          echo "New York time: $(TZ=America/New_York date)"
          echo "Scheduled trigger: ${{ github.event.schedule }}"
          echo "Report type: $REPORT_TYPE"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Generate investment report
        run: python main.py --report-type "$REPORT_TYPE"

      - name: Commit generated reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Update ${REPORT_TYPE} investment report"
          git push