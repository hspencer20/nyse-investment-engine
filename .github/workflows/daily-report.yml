name: Daily Investment Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python main.py
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest_report.md
          git diff --cached --quiet || git commit -m "Update daily investment report"
          git push
